      picture:     card.picture  || null,
      picX:        card.picX  != null ? card.picX  : 50,
      picY:        card.picY  != null ? card.picY  : 50,
      desc:        card.desc  || card.description || '',
      race:        card.race  || '',
      rarity:      card.rarity || 'common',
      type:        card.type  || card.cardType || 'minion',
      keywords:    kw,
      sleeping:    !hasChg,
      divineShield: hasDS,
      attacksLeft: hasWF ? 2 : 1,
      silenced:    false,
    };
  }

  function createMinionFromTemplate(cardId) {
    var tmpl = allCards.find(function (c) { return c.id === cardId; });
    if (!tmpl) return null;
    return createMinionFromCard({
      id: tmpl.id, name: tmpl.name,
      atk: tmpl.attack || 0, hp: tmpl.defense || 1, cost: tmpl.manaCost || 0,
      desc: tmpl.description || '', race: tmpl.race || '',
      keywords: tmpl.keywords || [], picture: tmpl.picture || null,
      picX: tmpl.picX, picY: tmpl.picY, rarity: tmpl.rarity,
    });
  }

  function minionToNetCard(m) {
    return {
      cardId: m.cardId, name: m.name, atk: m.atk, hp: m.hp, maxHp: m.maxHp,
      cost: m.cost, emoji: m.emoji, picture: m.picture || null,
      picX: m.picX, picY: m.picY, desc: m.desc, race: m.race,
      rarity: m.rarity, keywords: m.keywords, sleeping: m.sleeping,
      divineShield: m.divineShield, attacksLeft: m.attacksLeft, silenced: m.silenced,
    };
  }

  function netCardToFieldMinion(c) {
    return {
      id: 'opp_' + Date.now() + Math.random().toString(36).slice(2,5),
      cardId: c.cardId || '', name: c.name, atk: c.atk || 0,
      hp: c.hp || 1, maxHp: c.maxHp || c.hp || 1, cost: c.cost || 0,
      emoji: c.emoji || '⚔️', picture: c.picture || null,
      picX: c.picX != null ? c.picX : 50, picY: c.picY != null ? c.picY : 50,
      desc: c.desc || '', race: c.race || '', rarity: c.rarity || 'common',
      keywords: c.keywords || [], sleeping: !!c.sleeping,
      divineShield: !!c.divineShield, attacksLeft: c.attacksLeft || 1,
      silenced: !!c.silenced,
    };
  }

  function fieldMinionToHandCard(m) {
    return {
      id: m.cardId || m.id, name: m.name, cost: m.cost || 0,
      atk: m.atk, hp: m.maxHp, type: m.type || 'minion',
      desc: m.desc, race: m.race, keywords: m.keywords || [],
      picture: m.picture || null, picX: m.picX, picY: m.picY,
      rarity: m.rarity, emoji: m.emoji || '⚔️',
    };
  }

  // ─── Keyword effect helpers ────────────────────────────────────
  function applySilence(m) { m.silenced = true; m.keywords = []; m.divineShield = false; }
  function applyDivineShield(m) { m.divineShield = true; }

  function addKeyword(m, kw) {
    if (!m.keywords) m.keywords = [];
    if (!m.keywords.includes(kw)) m.keywords.push(kw);
  }

  function getTargetMinion(target) {
    if (!target) return null;
    var field = (target.owner === 'me') ? gs.me.field : gs.opp.field;
    return field[target.idx] || null;
  }

  function sendFieldSync() {
    sendNet({ action: 'field-sync', field: gs.me.field.map(minionToNetCard), handCount: gs.me.hand.length });
  }

  // ─── Deck effect helpers ──────────────────────────────────────
  function summonOrDrawByRace(race, count, toField) {
    var raceL = race.toLowerCase();
    var spawned = 0;
    for (var i = 0; i < gs.me.deck.length && spawned < count; i++) {
      if ((gs.me.deck[i].race || '').toLowerCase() === raceL) {
        var card = gs.me.deck.splice(i, 1)[0]; i--;
        gs.me.deckCount = Math.max(0, gs.me.deckCount - 1);
        spawned++;
        if (toField && gs.me.field.length < MAX_FIELD_SIZE) {
          gs.me.field.push(createMinionFromCard(card));
        } else if (!toField && gs.me.hand.length < 10) {
          gs.me.hand.push(card);
        }
      }
    }
    if (spawned < count && allCards.length) {
      var templates = allCards.filter(function (c) {
        return c.cardType === 'minion' && (c.race || '').toLowerCase() === raceL;
      });
      while (spawned < count && templates.length) {
        var tmpl = templates[Math.floor(Math.random() * templates.length)];
        spawned++;
        var handCard = {
          id: tmpl.id, name: tmpl.name, cost: tmpl.manaCost || 0,
          atk: tmpl.attack || 0, hp: tmpl.defense || 1, type: 'minion',
          desc: tmpl.description || '', race: tmpl.race || '',
          keywords: tmpl.keywords || [], picture: tmpl.picture || null,
          picX: tmpl.picX, picY: tmpl.picY, rarity: tmpl.rarity || 'common', emoji: '⚔️',
        };
        if (toField && gs.me.field.length < MAX_FIELD_SIZE) {
          gs.me.field.push(createMinionFromCard(handCard));
        } else if (!toField && gs.me.hand.length < 10) {
          gs.me.hand.push(handCard);
        }
      }
    }
  }

  function fillBoardWithNamibia() {
    var tmpl = allCards.find(function (c) { return c.id === 'mnho3jvibuvzn'; });
    while (gs.me.field.length < MAX_FIELD_SIZE) {
      var base = tmpl ? {
        id: tmpl.id, name: tmpl.name, atk: tmpl.attack || 0, hp: tmpl.defense || 1,
        desc: tmpl.description || '', race: tmpl.race || '',
        keywords: (tmpl.keywords && tmpl.keywords.length) ? tmpl.keywords : ['Divine Shield'],
        picture: tmpl.picture || null, picX: tmpl.picX, picY: tmpl.picY, rarity: tmpl.rarity,
      } : { id: 'mnho3jvibuvzn', name: 'Namibia', atk: 1, hp: 1, desc: '', race: 'none', keywords: ['Divine Shield'] };
      gs.me.field.push(createMinionFromCard(base));
    }
  }

  // ─── Targeting system ─────────────────────────────────────────
  function getTargetMode(card) {
    switch (card.id) {
      case 'mnhkv48ubc24c': return 'any-minion';      // Git Ignored
      case 'mnhp7evhvm2ar': return 'friendly-minion';  // Dong Norman
      case 'mnhpj3ttvnvn5': return 'friendly-minion';  // Heeeyyyyy
      case 'mnhoaj6ws7fni': return 'any-minion';       // Emilie
      case 'mnhp1g55vetoo': return 'any-minion';       // Flirty Anthony
      default:              return null;
    }
  }

  function enterTargeting(card, handIdx) {
    pendingPlay       = { card: card, handIdx: handIdx };
    pendingTargetMode = getTargetMode(card);
    document.body.classList.add('targeting-mode');
    renderAll();
  }

  function cancelTargeting() {
    pendingPlay = null; pendingTargetMode = null;
    document.body.classList.remove('targeting-mode');
    renderAll();
  }

  function onTargetSelected(owner, targetIdx) {
    if (!pendingPlay) return;
    var card = pendingPlay.card; var handIdx = pendingPlay.handIdx;
    cancelTargeting();
    executePlay(card, handIdx, { owner: owner, idx: targetIdx });
  }

  // ─── Execute a card play ──────────────────────────────────────
  function executePlay(card, handIdx, target) {
    gs.me.mana -= card.cost;
    gs.me.hand.splice(handIdx, 1);
    if (card.type === 'minion') {
      var m = createMinionFromCard(card);
      gs.me.field.push(m);
      resolveEffect(card, target);
      sendNet({
        action: 'play-minion', card: minionToNetCard(m),
        effectId: card.id, target: target,
        myField: gs.me.field.map(minionToNetCard), handCount: gs.me.hand.length,
      });
    } else {
      resolveEffect(card, target);
      sendNet({
        action: 'play-spell', cardId: card.id, target: target,
        myField: gs.me.field.map(minionToNetCard), handCount: gs.me.hand.length,
      });
    }
    renderAll();
  }

  // ─── Card effects dispatch ────────────────────────────────────
  function resolveEffect(card, target) {
    switch (card.id) {
      case 'mnhkv48ubc24c': { var m = getTargetMinion(target); if (m) applySilence(m); break; }
      case 'mnhnqi5fzx3ge': { summonOrDrawByRace('Rodiller', 1, true); break; }
      case 'mnhoqjk1ucdjt': { summonOrDrawByRace('Nita', 2, false); break; }
      case 'mnhp7evhvm2ar': {
        var m = getTargetMinion(target);
        if (m) { applyDivineShield(m); addKeyword(m,'Windfury'); m.attacksLeft=2; addKeyword(m,'Charge'); m.sleeping=false; }
        break;
      }
      case 'mnhpj3ttvnvn5': { var m = getTargetMinion(target); if (m) { m.atk+=2; m.hp+=2; m.maxHp+=2; } break; }
      case 'mnho123wgn29l': { fillBoardWithNamibia(); break; }
      case 'mnhoaj6ws7fni': {
        if (target) {
          var field = (target.owner === 'me') ? gs.me.field : gs.opp.field;
          var spliced = field.splice(target.idx, 1)[0];
          if (spliced) {
            if (target.owner === 'me' && gs.me.hand.length < 10) gs.me.hand.push(fieldMinionToHandCard(spliced));
            else if (target.owner === 'opp' && gs.opp.hand.length < 10) gs.opp.hand.push({ id: 'opp_hidden' });
          }
        }
        break;
      }
      case 'mnhojn13ctzan': { gs.me.field.forEach(applySilence); gs.opp.field.forEach(applySilence); break; }
      case 'mnhoogmbge1vk': { summonOrDrawByRace('Nita', 2, true); break; }
      case 'mnhp1g55vetoo': { var m = getTargetMinion(target); if (m) applyDivineShield(m); break; }
    }
  }

  // ─── Deathrattle ──────────────────────────────────────────────
  function resolveDeathrattle(minion) {
    if (minion.silenced) return;
    if (minion.cardId === 'mnhp3z0lp7pg2') { // Lochtnita – gain random Nita card
      var found = false;
      for (var i = 0; i < gs.me.deck.length; i++) {
        if ((gs.me.deck[i].race || '').toLowerCase() === 'nita') {
          if (gs.me.hand.length < 10) gs.me.hand.push(gs.me.deck.splice(i, 1)[0]);
          gs.me.deckCount = Math.max(0, gs.me.deckCount - 1);
          found = true; break;
        }
      }
      if (!found && allCards.length && gs.me.hand.length < 10) {
        var pool = allCards.filter(function (c) { return (c.race||'').toLowerCase() === 'nita' && c.cardType === 'minion'; });
        if (pool.length) {
          var tmpl = pool[Math.floor(Math.random() * pool.length)];
          gs.me.hand.push({ id:tmpl.id, name:tmpl.name, cost:tmpl.manaCost||0, atk:tmpl.attack||0,
            hp:tmpl.defense||1, type:'minion', desc:tmpl.description||'', race:tmpl.race||'',
            keywords:tmpl.keywords||[], picture:tmpl.picture||null, picX:tmpl.picX,
            picY:tmpl.picY, rarity:tmpl.rarity||'common', emoji:'⚔️' });
        }
      }
      sendFieldSync();
    }
  }

  // ─── Network receivers for card effects ──────────────────────
  function receiveCardEffect(data) {
    if (data.myField) gs.opp.field = data.myField.map(netCardToFieldMinion);
    if (data.handCount != null) {
      var hc = Math.max(0, Math.min(10, data.handCount));
      gs.opp.hand = new Array(hc).fill(0).map(function () { return { id:'opp_hidden' }; });
    }
    var target = data.target;
    var cardId  = data.effectId || data.cardId;
    switch (cardId) {
      case 'mnhkv48ubc24c': // Git Ignored silence
        if (target && target.owner === 'opp' && gs.me.field[target.idx]) applySilence(gs.me.field[target.idx]);
        break;
      case 'mnhoaj6ws7fni': // Emilie bounce
        if (target && target.owner === 'opp' && gs.me.field[target.idx]) {
          var bounced = gs.me.field.splice(target.idx, 1)[0];
          if (bounced && gs.me.hand.length < 10) gs.me.hand.push(fieldMinionToHandCard(bounced));
        }
        break;
      case 'mnhojn13ctzan': // Emmanunita silence all
        gs.me.field.forEach(applySilence);
        break;
    }
    renderAll();
  }

  function receiveFieldSync(data) {
    if (data.field) gs.opp.field = data.field.map(netCardToFieldMinion);
    if (data.handCount != null) {
      var hc = Math.max(0, Math.min(10, data.handCount));
      gs.opp.hand = new Array(hc).fill(0).map(function () { return { id:'opp_hidden' }; });
    }
    renderAll();
  }

  // ─── Init ────────────────────────────────────────────────────
  var _initStarted = false;
  var _hostTurnPending = false; // host waiting for guest-ready ACK

  // Called once MQTT subscription is confirmed (or immediately in standalone mode)
  function onMqttReady() {
    if (_initStarted) return;
    _initStarted = true;

    if (!roomCode) {
      // Standalone/test mode — start immediately
      startTurn('host');
      return;
    }

    if (myRole === 'host') {
      // Broadcast game-start so the guest knows the host is subscribed.
      // Retry several times to handle brief MQTT hiccups.
      _hostTurnPending = true;
      var attempts = 0;
      function sendGameStart() {
        if (!_hostTurnPending) return;
        if (mqtt && mqtt.connected) {
          mqtt.publish(TOPIC_PREFIX + roomCode,
            JSON.stringify({ sid: mySessionId, from: 'host', type: 'game-start' }), { qos: 1 });
        }
        attempts++;
        if (attempts < 8) setTimeout(sendGameStart, 800);
      }
      setTimeout(sendGameStart, 400);
      // Hard fallback: start turn 1 even if guest-ready never arrives
      setTimeout(function () {
        if (_hostTurnPending) { _hostTurnPending = false; startTurn('host'); }
      }, 8000);
    } else {
      // Guest: send ACK so the host knows we are subscribed and ready
      function sendGuestReady() {
        if (mqtt && mqtt.connected) {
          mqtt.publish(TOPIC_PREFIX + roomCode,
            JSON.stringify({ sid: mySessionId, from: 'guest', type: 'guest-ready' }), { qos: 1 });
        }
      }
      sendGuestReady();
      // Wait for host's game-start (handled in onMessage -> startTurn('host'))
      // Hard fallback in case those messages never arrive
      setTimeout(function () {
        if (!guestReceivedStart) {
          guestReceivedStart = true;
          startTurn('host');
        }
      }, 8000);
    }
  }

  function onGuestReady() {
    if (!_hostTurnPending) return;
    _hostTurnPending = false;
    startTurn('host');
  }

  function init() {
    // Deal opening hands
    drawCard('me', 3);
    // Opponent's simulated hand (3 cards face-down)
    for (var i = 0; i < 3; i++) {
      if (gs.opp.hand.length < 10) {
        gs.opp.hand.push({ id: 'opp_hidden' });
        gs.opp.deckCount = Math.max(0, gs.opp.deckCount - 1);
      }
    }

    // Render initial board — End Turn button stays disabled until handshake
    $endTurnBtn.disabled = true;
    renderAll();

    connectMQTT();

    // Fallback: if MQTT never connects (standalone / network error),
    // start after 4 seconds so the game is still playable solo.
    setTimeout(function () { onMqttReady(); }, 4000);
  }

  // Use deck from lobby session if available; otherwise build from localStorage.
  // Only fall back to the dummy deck if no built deck exists at all.
  if (myDeck.length > 0) {
    init();
  } else {
    buildDeckFromStorage().then(function (builtDeck) {
      if (builtDeck.length > 0) {
        gs.me.deck = builtDeck;
        gs.me.deckCount = builtDeck.length;
      } else {
        gs.me.deck = makeDummyDeck();
        gs.me.deckCount = gs.me.deck.length;
      }
      init();
    });
  }

})();
</script>
