<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardLogy — Card Database</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #c9a84c;
      --accent2: #e8c97a;
      --green:   #3fb950;
      --red:     #f85149;
      --blue:    #58a6ff;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --radius:  12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: auto;
    }

    header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
    }
    header a:hover { color: var(--text); }

    /* ── Toolbar ──────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.8rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .toolbar input[type="text"],
    .toolbar select {
      padding: 0.45rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .toolbar input[type="text"] { min-width: 200px; cursor: text; }
    .toolbar input[type="text"]:focus,
    .toolbar select:focus { border-color: var(--accent); }

    .spacer { flex: 1; }

    .count-badge {
      background: var(--border);
      color: var(--muted);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    /* ── Buttons ──────────────────────────── */
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: var(--accent);     color: #0d1117; }
    .btn-danger   { background: var(--red);         color: #fff; }
    .btn-ghost    { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm       { padding: 0.3rem 0.65rem; font-size: 0.8rem; }

    /* ── Card Grid ────────────────────────── */
    .grid-container {
      padding: 1.75rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2.5rem 1.75rem;
      justify-items: center;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .empty-state h2 { color: var(--text); margin-bottom: 0.5rem; font-size: 1.2rem; }

    /* ── Hearthstone Card Frame ───────────── */
    .hs-card {
      position: relative;
      width: 200px;
      height: 290px;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      overflow: visible;
      flex-shrink: 0;
    }

    .hs-card:hover {
      transform: translateY(-10px) scale(1.05);
      z-index: 10;
    }

    /* Card shell */
    .hs-card .frame {
      position: absolute;
      inset: 0;
      border-radius: 16px 16px 12px 12px;
      overflow: hidden;
    }

    /* Type backgrounds */
    .hs-card.type-minion .frame {
      background: radial-gradient(ellipse at 50% 20%, #2d3f58 0%, #111e2e 50%, #0a1520 100%);
    }
    .hs-card.type-spell .frame {
      background: radial-gradient(ellipse at 50% 20%, #3d2068 0%, #1a0d38 50%, #0d0620 100%);
    }

    /* Rarity border rings + glow */
    .hs-card.rarity-common    .frame { box-shadow: 0 0 0 3px #5a6270, 0 0 0 5px #0a0c10, 0 8px 24px rgba(0,0,0,0.8); }
    .hs-card.rarity-rare      .frame { box-shadow: 0 0 0 3px #2563eb, 0 0 0 5px #0a0c10, 0 0 28px rgba(59,130,246,0.4),  0 8px 24px rgba(0,0,0,0.8); }
    .hs-card.rarity-epic      .frame { box-shadow: 0 0 0 3px #9333ea, 0 0 0 5px #0a0c10, 0 0 28px rgba(168,85,247,0.45), 0 8px 24px rgba(0,0,0,0.8); }
    .hs-card.rarity-legendary .frame { box-shadow: 0 0 0 3px #d97706, 0 0 0 5px #0a0c10, 0 0 35px rgba(245,158,11,0.55), 0 8px 24px rgba(0,0,0,0.8); }

    /* Inner decorative golden inset line */
    .hs-card .frame::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 12px 12px 8px 8px;
      border: 1px solid rgba(200,160,60,0.18);
      pointer-events: none;
      z-index: 8;
    }

    /* Art area — rectangular at top, golden bottom-shadow separator */
    .hs-card .art {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 145px;
      background: #111827;
      overflow: hidden;
      box-shadow: 0 3px 0 rgba(180,140,50,0.45), 0 5px 10px rgba(0,0,0,0.5);
    }

    .hs-card .art img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .hs-card .art-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      opacity: 0.25;
    }

    /* Vignette fading art into the card body */
    .hs-card .art::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50px;
      background: linear-gradient(to bottom, transparent, rgba(10,18,28,0.6));
      pointer-events: none;
    }

    /* Name banner — fading ribbon that bleeds past card edges */
    .hs-card .name-banner {
      position: absolute;
      left: -12px; right: -12px;
      top: 131px;
      height: 28px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 900;
      color: #1a0800;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 0 rgba(255,225,100,0.35);
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(70,45,5,0.98)   4%,
        rgba(170,120,35,1)  11%,
        rgba(225,178,65,1)  24%,
        rgba(248,210,100,1) 50%,
        rgba(225,178,65,1)  76%,
        rgba(170,120,35,1)  89%,
        rgba(70,45,5,0.98)  96%,
        transparent 100%
      );
      border-top:    1px solid rgba(255,235,130,0.45);
      border-bottom: 1px solid rgba(110,70,5,0.6);
    }

    /* Rarity gem dot below name banner */
    .hs-card .rarity-gem {
      position: absolute;
      top: 161px;
      left: 50%;
      transform: translateX(-50%);
      width: 11px; height: 11px;
      border-radius: 50%;
      z-index: 5;
      border: 1px solid rgba(0,0,0,0.45);
    }
    .hs-card.rarity-common    .rarity-gem { background: radial-gradient(circle at 35% 30%, #e5e7eb, #6b7280); box-shadow: 0 0 4px rgba(200,200,200,0.5); }
    .hs-card.rarity-rare      .rarity-gem { background: radial-gradient(circle at 35% 30%, #93c5fd, #1d4ed8); box-shadow: 0 0 8px rgba(59,130,246,0.85); }
    .hs-card.rarity-epic      .rarity-gem { background: radial-gradient(circle at 35% 30%, #d8b4fe, #7e22ce); box-shadow: 0 0 8px rgba(168,85,247,0.9); }
    .hs-card.rarity-legendary .rarity-gem { background: radial-gradient(circle at 35% 30%, #fde68a, #b45309); box-shadow: 0 0 10px rgba(245,158,11,1); }

    /* Description box — parchment / scroll style */
    .hs-card .desc-box {
      position: absolute;
      left: 10px; right: 10px;
      top: 174px; bottom: 26px;
      background: linear-gradient(155deg, #f5e9cc 0%, #ede2ba 55%, #e8d8a5 100%);
      border-radius: 6px 6px 4px 4px;
      border: 1px solid rgba(140,100,25,0.4);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.4);
      padding: 5px 8px;
      font-size: 0.6rem;
      line-height: 1.5;
      color: #2a1800;
      overflow: hidden;
      z-index: 2;
      font-style: italic;
      text-align: center;
    }

    .hs-card .desc-box .kw {
      color: #6b2200;
      font-weight: 900;
      font-style: normal;
    }

    /* Type / race strip — dark golden pill at bottom */
    .hs-card .type-strip {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: linear-gradient(90deg, #0c0a05 0%, #28200e 35%, #28200e 65%, #0c0a05 100%);
      border: 1px solid rgba(190,150,55,0.5);
      border-radius: 999px;
      padding: 2px 14px;
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c8a040;
      z-index: 3;
      box-shadow: 0 1px 5px rgba(0,0,0,0.7);
    }

    /* Mana gem — top-left, pentagon */
    .hs-card .gem-mana {
      position: absolute;
      top: -12px; left: -12px;
      width: 42px; height: 42px;
      clip-path: polygon(50% 0%, 100% 36%, 82% 100%, 18% 100%, 0% 36%);
      background: radial-gradient(circle at 38% 32%, #ddf0ff, #1565c0 50%, #082760);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      z-index: 6;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.8)) drop-shadow(0 0 6px rgba(100,180,255,0.6));
    }

    /* Attack diamond — bottom-left */
    .hs-card .gem-attack {
      position: absolute;
      bottom: -12px; left: -12px;
      width: 40px; height: 40px;
      background: radial-gradient(circle at 33% 28%, #fff0a0, #d4890a 52%, #7a4200);
      border: 2px solid #ffe89e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      z-index: 6;
      border-radius: 7px;
      transform: rotate(45deg);
      box-shadow: 0 3px 12px rgba(0,0,0,0.75), inset 0 2px 4px rgba(255,255,255,0.2);
    }
    .hs-card .gem-attack span { transform: rotate(-45deg); display: block; }

    /* Health orb — bottom-right */
    .hs-card .gem-defense {
      position: absolute;
      bottom: -12px; right: -12px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 33% 28%, #ffb8b8, #c0392b 50%, #6a0a0a);
      border: 2px solid #ffaaaa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      z-index: 6;
      box-shadow: 0 3px 12px rgba(0,0,0,0.75), inset 0 2px 4px rgba(255,255,255,0.3);
    }



    /* ── Modal ────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 700px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 1.5rem;
      position: relative;
    }

    .modal h2 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
      color: var(--accent);
    }

    .modal .close-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none; border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--muted);
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .modal .close-btn:hover { background: var(--border); color: var(--text); }

    /* Form layout */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field-label {
      display: block;
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    .field-label .note {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    input[type="text"],
    input[type="number"],
    input[type="url"],
    select,
    textarea {
      width: 100%;
      padding: 0.55rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

    /* Number inputs */
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button { opacity: 1; }

    /* File input */
    .file-input-wrapper {
      position: relative;
    }
    input[type="file"] {
      width: 100%;
      padding: 0.45rem 0.75rem;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
    }
    input[type="file"]:hover { border-color: var(--accent); }

    /* Keyword chips */
    .keywords-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .kw-chip {
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .kw-chip:hover { border-color: var(--accent2); color: var(--accent2); }
    .kw-chip.selected {
      background: rgba(201,168,76,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Art preview */
    .art-preview {
      width: 100%;
      height: 110px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.5rem;
      position: relative;
      user-select: none;
    }
    .art-preview.has-image { cursor: grab; }
    .art-preview.has-image:active { cursor: grabbing; }
    .art-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* focal-point crosshair */
    .pos-dot {
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 0 6px rgba(0,0,0,0.5);
    }
    .pos-dot::before, .pos-dot::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.85);
    }
    .pos-dot::before { width: 1px; height: 8px; left: 50%; top: -5px; transform: translateX(-50%); }
    .pos-dot::after  { height: 1px; width: 8px; top: 50%; left: -5px; transform: translateY(-50%); }

    .art-hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.35rem;
      text-align: center;
    }
    .art-hint span { color: var(--accent2); font-variant-numeric: tabular-nums; }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
      align-items: center;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <header>
    <span class="logo">CardLogy — Cards</span>
    <a href="index.html">← Lobby</a>
    <button class="btn-primary" id="btnNew">+ New Card</button>
  </header>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search by name or text…" />
    <select id="filterType">
      <option value="">All Types</option>
      <option value="minion">Minion</option>
      <option value="spell">Spell</option>
    </select>
    <select id="filterMana">
      <option value="">Any Mana</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10+</option>
    </select>
    <select id="filterRarity">
      <option value="">All Rarities</option>
      <option value="common">Common</option>
      <option value="rare">Rare</option>
      <option value="epic">Epic</option>
      <option value="legendary">Legendary</option>
    </select>
    <select id="filterRace">
      <option value="">All Races</option>
      <option value="none">None</option>
      <option value="murloc">Murloc</option>
      <option value="undead">Undead</option>
      <option value="beast">Beast</option>
      <option value="dragon">Dragon</option>
      <option value="mech">Mech</option>
      <option value="elemental">Elemental</option>
      <option value="pirate">Pirate</option>
      <option value="demon">Demon</option>
      <option value="naga">Naga</option>
      <option value="quilboar">Quilboar</option>
      <option value="totem">Totem</option>
    </select>
    <div class="spacer"></div>
    <span class="count-badge" id="cardCount">0 cards</span>
    <button class="btn-ghost btn-sm" id="btnImport">Import JSON</button>
    <button class="btn-ghost btn-sm" id="btnExport">Export JSON</button>
  </div>

  <div class="grid-container" id="cardGrid">
    <div class="empty-state">
      <h2>No cards yet</h2>
      <p>Click "+ New Card" to add your first card to the database.</p>
    </div>
  </div>

  <!-- ── Add / Edit Modal ───────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button type="button" class="close-btn" id="modalClose">✕</button>
      <h2 id="modalTitle">New Card</h2>

      <div class="form-grid">

        <div>
          <label class="field-label" for="fName">Name</label>
          <input type="text" id="fName" placeholder="Card name" maxlength="40" />
        </div>

        <div>
          <label class="field-label" for="fCardType">Type</label>
          <select id="fCardType">
            <option value="minion">Minion</option>
            <option value="spell">Spell</option>
          </select>
        </div>

        <div>
          <label class="field-label" for="fManaCost">Mana Cost</label>
          <input type="number" id="fManaCost" min="0" max="20" value="1" />
        </div>

        <div>
          <label class="field-label" for="fRarity">Rarity</label>
          <select id="fRarity">
            <option value="common">Common</option>
            <option value="rare">Rare</option>
            <option value="epic">Epic</option>
            <option value="legendary">Legendary</option>
          </select>
        </div>

        <div id="rowRace" class="full">
          <label class="field-label" for="fRace">Race / Tribe <span class="note">(Minion only)</span></label>
          <select id="fRace">
            <option value="none">None</option>
            <option value="murloc">Murloc</option>
            <option value="undead">Undead</option>
            <option value="beast">Beast</option>
            <option value="dragon">Dragon</option>
            <option value="mech">Mech</option>
            <option value="elemental">Elemental</option>
            <option value="pirate">Pirate</option>
            <option value="demon">Demon</option>
            <option value="naga">Naga</option>
            <option value="quilboar">Quilboar</option>
            <option value="totem">Totem</option>
          </select>
        </div>

        <div id="rowAttack">
          <label class="field-label" for="fAttack">Attack</label>
          <input type="number" id="fAttack" min="0" max="99" value="1" />
        </div>

        <div id="rowDefense">
          <label class="field-label" for="fDefense">Defense / Health</label>
          <input type="number" id="fDefense" min="0" max="99" value="1" />
        </div>

        <div class="full">
          <label class="field-label" for="fDesc">
            Description
            <span class="note"> — keyword interpreter (Taunt, Battlecry, etc. will highlight)</span>
          </label>
          <textarea id="fDesc" placeholder="e.g. Taunt. Battlecry: Deal 2 damage to a random enemy."></textarea>
        </div>

        <div class="full">
          <label class="field-label">Keywords <span class="note">(click to toggle)</span></label>
          <div class="keywords-row" id="kwChips"></div>
        </div>

        <div class="full">
          <label class="field-label" for="fPicUrl">Picture URL</label>
          <input type="url" id="fPicUrl" placeholder="https://example.com/art.png" />
        </div>

        <div class="full">
          <label class="field-label" for="fPicFile">
            — or upload an image <span class="note">(stored locally)</span>
          </label>
          <input type="file" id="fPicFile" accept="image/*" />
          <div class="art-preview" id="artPreview">
            <span>No image selected</span>
          </div>
          <p class="art-hint" id="artHint" style="display:none">
            Drag to reframe &nbsp;&middot;&nbsp; <span id="posLabel">50%, 50%</span>
          </p>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-danger btn-sm" id="btnDeleteCard" style="display:none; margin-right:auto;">Delete Card</button>
        <button type="button" class="btn-ghost" id="btnCancel">Cancel</button>
        <button type="button" class="btn-primary" id="btnSave">Save Card</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for JSON import -->
  <input type="file" id="importFile" accept=".json" style="display:none" />

  <script>
    // ── Constants ──────────────────────────────────────────
    const API        = '/cards';  // proxied to localhost:8080 in dev (see vite.config.js)
    const CARDS_JSON = './cards.json'; // static read (GitHub Pages + local)

    const KEYWORDS = [
      'Taunt', 'Charge', 'Rush', 'Divine Shield', 'Stealth', 'Poisonous',
      'Lifesteal', 'Freeze', 'Windfury', 'Mega-Windfury', 'Immune', 'Reborn',
      'Battlecry', 'Deathrattle', 'Discover', 'Overkill', 'Echo', 'Silence',
      'Combo', 'Overload', 'Spell Damage +1', 'Spell Damage +2',
    ];

    const RACE_EMOJI = {
      murloc: '🐟', undead: '💀', beast: '🐾', dragon: '🐉',
      mech: '⚙️', elemental: '🔥', pirate: '☠️', demon: '👹',
      naga: '🐍', quilboar: '🐗', totem: '🪵', none: '🧙',
    };
    const TYPE_EMOJI = { minion: '🗡️', spell: '✨' };

    // ── State ──────────────────────────────────────────────
    let db = [];
    let editingId = null;
    let selectedKw = new Set();
    let picX = 50, picY = 50;  // focal point %

    // ── Server API ─────────────────────────────────────────
    async function loadDB() {
      try {
        const res = await fetch(CARDS_JSON);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        db = await res.json();
      } catch (e) {
        console.error('Could not load cards:', e);
        db = [];
      }
      renderGrid();
    }

    async function pushCard(card) {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(card),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function deleteCard(id) {
      const res = await fetch(`${API}/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function highlightKeywords(text) {
      if (!text) return '';
      const escaped = escapeHtml(text);
      // Build pattern from longest keyword to shortest (avoid partial matches)
      const sorted = [...KEYWORDS].sort((a, b) => b.length - a.length);
      const pattern = sorted.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
      return escaped.replace(new RegExp(`(${pattern})`, 'gi'),
        '<span class="kw">$1</span>'
      );
    }

    // ── Build a single card element ────────────────────────
    function buildCardEl(card) {
      const wrapper = document.createElement('div');
      wrapper.className = `hs-card type-${card.cardType} rarity-${card.rarity}`;
      wrapper.dataset.id = card.id;

      const frame = document.createElement('div');
      frame.className = 'frame';

      // Art
      const art = document.createElement('div');
      art.className = 'art';
      const artPlaceholder = card.cardType === 'minion' && card.race && card.race !== 'none'
        ? (RACE_EMOJI[card.race] ?? '🗡️')
        : (TYPE_EMOJI[card.cardType] ?? '🃏');
      if (card.picture) {
        const img = document.createElement('img');
        img.src = card.picture;
        img.alt = card.name;
        img.style.objectPosition = `${card.picX ?? 50}% ${card.picY ?? 50}%`;
        img.onerror = () => { img.remove(); art.innerHTML = `<div class="art-placeholder">${artPlaceholder}</div>`; };
        art.appendChild(img);
      } else {
        art.innerHTML = `<div class="art-placeholder">${artPlaceholder}</div>`;
      }
      frame.appendChild(art);

      // Name banner
      const banner = document.createElement('div');
      banner.className = 'name-banner';
      banner.textContent = card.name || 'Unnamed';
      frame.appendChild(banner);

      // Rarity gem
      const rarityGem = document.createElement('div');
      rarityGem.className = 'rarity-gem';
      frame.appendChild(rarityGem);

      // Type strip — shows race for minions, type for spells
      const typeStrip = document.createElement('div');
      typeStrip.className = 'type-strip';
      if (card.cardType === 'minion' && card.race && card.race !== 'none') {
        typeStrip.textContent = card.race.toUpperCase();
      } else {
        typeStrip.textContent = card.cardType.toUpperCase();
      }
      frame.appendChild(typeStrip);

      // Description box
      const desc = document.createElement('div');
      desc.className = 'desc-box';
      desc.innerHTML = highlightKeywords(card.description ?? '');
      frame.appendChild(desc);

      wrapper.appendChild(frame);

      // Mana gem
      const mana = document.createElement('div');
      mana.className = 'gem-mana';
      mana.textContent = card.manaCost ?? 0;
      wrapper.appendChild(mana);

      // Attack / defense gems (minion only)
      if (card.cardType === 'minion') {
        const atk = document.createElement('div');
        atk.className = 'gem-attack';
        atk.innerHTML = `<span>${card.attack ?? 0}</span>`;
        wrapper.appendChild(atk);

        const def = document.createElement('div');
        def.className = 'gem-defense';
        def.textContent = card.defense ?? 1;
        wrapper.appendChild(def);
      }

      wrapper.addEventListener('click', () => openEdit(card.id));
      return wrapper;
    }

    // ── Render grid ────────────────────────────────────────
    function renderGrid() {
      const grid = document.getElementById('cardGrid');
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const fType   = document.getElementById('filterType').value;
      const fMana   = document.getElementById('filterMana').value;
      const fRarity = document.getElementById('filterRarity').value;
      const fRace   = document.getElementById('filterRace').value;

      let filtered = db.filter(c => {
        if (query && !c.name.toLowerCase().includes(query) &&
            !(c.description ?? '').toLowerCase().includes(query)) return false;
        if (fType   && c.cardType !== fType)   return false;
        if (fRarity && c.rarity   !== fRarity) return false;
        if (fRace   && (c.race ?? 'none') !== fRace) return false;
        if (fMana !== '') {
          const mn = parseInt(fMana);
          if (mn === 10 ? (c.manaCost ?? 0) < 10 : (c.manaCost ?? 0) !== mn) return false;
        }
        return true;
      });

      // Sort: mana cost ASC, then alphabetical
      filtered.sort((a, b) => (a.manaCost ?? 0) - (b.manaCost ?? 0) || a.name.localeCompare(b.name));

      grid.innerHTML = '';
      if (filtered.length === 0) {
        const msg = db.length === 0
          ? ['No cards yet', 'Click "+ New Card" to add your first card.']
          : ['No results', 'Try adjusting your filters.'];
        grid.innerHTML = `<div class="empty-state"><h2>${msg[0]}</h2><p>${msg[1]}</p></div>`;
      } else {
        filtered.forEach(c => grid.appendChild(buildCardEl(c)));
      }

      document.getElementById('cardCount').textContent =
        `${db.length} card${db.length !== 1 ? 's' : ''}`;
    }

    // ── Keyword chips ──────────────────────────────────────
    function renderKwChips() {
      const container = document.getElementById('kwChips');
      container.innerHTML = '';
      KEYWORDS.forEach(kw => {
        const chip = document.createElement('span');
        chip.className = 'kw-chip' + (selectedKw.has(kw) ? ' selected' : '');
        chip.textContent = kw;
        chip.addEventListener('click', () => {
          selectedKw.has(kw) ? selectedKw.delete(kw) : selectedKw.add(kw);
          chip.classList.toggle('selected');
        });
        container.appendChild(chip);
      });
    }

    // ── Form helpers ───────────────────────────────────────
    function updateTypeFields() {
      const type = document.getElementById('fCardType').value;
      const rowAtk  = document.getElementById('rowAttack');
      const rowDef  = document.getElementById('rowDefense');
      const rowRace = document.getElementById('rowRace');

      if (type === 'spell') {
        rowAtk.style.display  = 'none';
        rowDef.style.display  = 'none';
        rowRace.style.display = 'none';
      } else {
        rowAtk.style.display  = '';
        rowDef.style.display  = '';
        rowRace.style.display = '';
      }
    }

    function clearForm() {
      document.getElementById('fName').value = '';
      document.getElementById('fCardType').value = 'minion';
      document.getElementById('fManaCost').value = '1';
      document.getElementById('fRarity').value = 'common';
      document.getElementById('fAttack').value = '1';
      document.getElementById('fDefense').value = '1';
      document.getElementById('fDesc').value = '';
      document.getElementById('fRace').value = 'none';
      document.getElementById('fPicUrl').value = '';
      document.getElementById('fPicFile').value = '';
      document.getElementById('artPreview').innerHTML = '<span>No image selected</span>';
      document.getElementById('artPreview').classList.remove('has-image');
      document.getElementById('artHint').style.display = 'none';
      picX = 50; picY = 50;
      selectedKw = new Set();
      updateTypeFields();
    }

    function updatePosDot() {
      const preview = document.getElementById('artPreview');
      const img = preview.querySelector('img');
      const dot = preview.querySelector('.pos-dot');
      if (img) img.style.objectPosition = `${picX}% ${picY}%`;
      if (dot) { dot.style.left = `${picX}%`; dot.style.top = `${picY}%`; }
      const lbl = document.getElementById('posLabel');
      if (lbl) lbl.textContent = `${Math.round(picX)}%, ${Math.round(picY)}%`;
    }

    function setArtPreview(src) {
      const preview = document.getElementById('artPreview');
      const hint    = document.getElementById('artHint');
      if (src) {
        preview.innerHTML = `<img src="${escapeHtml(src)}" alt="Preview" /><div class="pos-dot"></div>`;
        preview.classList.add('has-image');
        hint.style.display = '';
        updatePosDot();
      } else {
        preview.innerHTML = '<span>No image selected</span>';
        preview.classList.remove('has-image');
        hint.style.display = 'none';
      }
    }

    // ── Modal open / close ─────────────────────────────────
    function openModal(title) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalOverlay').classList.add('open');
      renderKwChips();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      editingId = null;
      clearForm();
    }

    function openNew() {
      editingId = null;
      clearForm();
      document.getElementById('btnDeleteCard').style.display = 'none';
      openModal('New Card');
    }

    function openEdit(id) {
      const card = db.find(c => c.id === id);
      if (!card) return;
      editingId = id;

      document.getElementById('fName').value      = card.name ?? '';
      document.getElementById('fCardType').value  = card.cardType ?? 'minion';
      document.getElementById('fManaCost').value  = card.manaCost ?? 0;
      document.getElementById('fRarity').value    = card.rarity ?? 'common';
      document.getElementById('fAttack').value    = card.attack ?? 0;
      document.getElementById('fDefense').value   = card.defense ?? 1;
      document.getElementById('fDesc').value      = card.description ?? '';
      document.getElementById('fRace').value      = card.race ?? 'none';

      const isUrl = typeof card.picture === 'string' && card.picture.startsWith('http');
      document.getElementById('fPicUrl').value = isUrl ? card.picture : '';
      picX = card.picX ?? 50;
      picY = card.picY ?? 50;
      setArtPreview(card.picture ?? null);

      selectedKw = new Set(card.keywords ?? []);
      updateTypeFields();
      document.getElementById('btnDeleteCard').style.display = '';
      openModal('Edit Card');
    }

    // ── Save card ──────────────────────────────────────────
    function buildCard(picOverride) {
      const cardType = document.getElementById('fCardType').value;
      const card = {
        id:          editingId ?? genId(),
        name:        document.getElementById('fName').value.trim() || 'Unnamed Card',
        cardType,
        rarity:      document.getElementById('fRarity').value,
        manaCost:    Math.max(0, parseInt(document.getElementById('fManaCost').value) || 0),
        description: document.getElementById('fDesc').value.trim(),
        race:        cardType !== 'spell' ? document.getElementById('fRace').value : 'none',
        keywords:    [...selectedKw],
        picX,
        picY,
        picture:     picOverride !== undefined ? picOverride : null,
        createdAt:   editingId
          ? (db.find(c => c.id === editingId)?.createdAt ?? Date.now())
          : Date.now(),
      };

      if (cardType !== 'spell') {
        card.attack  = Math.max(0, parseInt(document.getElementById('fAttack').value)  || 0);
        card.defense = Math.max(0, parseInt(document.getElementById('fDefense').value) || 0);
      }

      // If no new pic provided, keep existing
      if (picOverride === undefined) {
        const urlField = document.getElementById('fPicUrl').value.trim();
        if (editingId) {
          card.picture = urlField || db.find(c => c.id === editingId)?.picture || null;
        } else {
          card.picture = urlField || null;
        }
      }

      return card;
    }

    async function saveCard(picOverride) {
      try {
        const card = buildCard(picOverride);
        await pushCard(card);

        if (editingId) {
          const idx = db.findIndex(c => c.id === editingId);
          if (idx !== -1) db[idx] = card;
        } else {
          db.push(card);
        }

        renderGrid();
        closeModal();
      } catch (err) {
        console.error('Save failed:', err);
        alert('Could not save card: ' + err.message);
      }
    }

    // ── Export / Import ────────────────────────────────────
    function exportDB() {
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'cardlogy-cards.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importDB(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) { alert('Invalid format: expected a JSON array.'); return; }
          const existing = new Set(db.map(c => c.id));
          const newCards = data.filter(c => c && typeof c === 'object' && c.id && !existing.has(c.id));
          for (const card of newCards) {
            await pushCard(card);
            db.push(card);
          }
          renderGrid();
          alert(`Imported ${newCards.length} card${newCards.length !== 1 ? 's' : ''}.`);
        } catch { alert('Could not import cards.'); }
      };
      reader.readAsText(file);
    }

    // ── Drag-to-reframe ────────────────────────────────────
    (() => {
      const preview = document.getElementById('artPreview');
      let dragging = false, lastX = 0, lastY = 0;

      preview.addEventListener('mousedown', e => {
        if (!preview.classList.contains('has-image')) return;
        dragging = true;
        lastX = e.clientX; lastY = e.clientY;
        e.preventDefault();
      });

      window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const rect = preview.getBoundingClientRect();
        // dragging left  → show more of right side  → picX increases
        picX = Math.min(100, Math.max(0, picX + (e.clientX - lastX) / rect.width  * -100));
        picY = Math.min(100, Math.max(0, picY + (e.clientY - lastY) / rect.height * -100));
        lastX = e.clientX; lastY = e.clientY;
        updatePosDot();
      });

      window.addEventListener('mouseup', () => { dragging = false; });

      // Touch support
      preview.addEventListener('touchstart', e => {
        if (!preview.classList.contains('has-image')) return;
        dragging = true;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchmove', e => {
        if (!dragging) return;
        const rect = preview.getBoundingClientRect();
        picX = Math.min(100, Math.max(0, picX + (e.touches[0].clientX - lastX) / rect.width  * -100));
        picY = Math.min(100, Math.max(0, picY + (e.touches[0].clientY - lastY) / rect.height * -100));
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        updatePosDot();
      }, { passive: true });

      window.addEventListener('touchend', () => { dragging = false; });
    })();

    // ── Event wiring ───────────────────────────────────────
    document.getElementById('btnNew').addEventListener('click', openNew);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);

    document.getElementById('fCardType').addEventListener('change', updateTypeFields);

    // Live art preview from URL
    document.getElementById('fPicUrl').addEventListener('input', e => {
      setArtPreview(e.target.value.trim() || null);
    });

    // Live art preview from file upload
    document.getElementById('fPicFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => setArtPreview(ev.target.result);
      reader.readAsDataURL(file);
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      const fileInput = document.getElementById('fPicFile');
      if (fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = e => saveCard(e.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        saveCard(undefined);
      }
    });

    document.getElementById('btnDeleteCard').addEventListener('click', async () => {
      if (editingId && confirm('Delete this card? This cannot be undone.')) {
        try {
          await deleteCard(editingId);
          db = db.filter(c => c.id !== editingId);
          renderGrid();
          closeModal();
        } catch (err) {
          alert('Could not delete card: ' + err.message);
        }
      }
    });

    document.getElementById('btnExport').addEventListener('click', exportDB);
    document.getElementById('btnImport').addEventListener('click',
      () => document.getElementById('importFile').click()
    );
    document.getElementById('importFile').addEventListener('change', e => {
      importDB(e.target.files[0]);
      e.target.value = '';
    });

    ['searchInput', 'filterType', 'filterMana', 'filterRarity', 'filterRace'].forEach(id =>
      document.getElementById(id).addEventListener('input', renderGrid)
    );

    // Close modal on backdrop click or Escape key
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open')) {
        closeModal();
      }
    });

    // Boot
    loadDB();
  </script>
</body>
</html>
